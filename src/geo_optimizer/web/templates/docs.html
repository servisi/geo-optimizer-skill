<head>

<style>
:root{--bg:#06080f;--bg-card:#0d1117;--border:#1b2332;--text:#e2e8f0;--text-dim:#64748b;--text-muted:#475569;
--accent:#3b82f6;--accent2:#8b5cf6;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;
background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
a{color:var(--accent);text-decoration:none;transition:color .2s}a:hover{color:var(--accent2)}
.wrapper{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:2rem 1.5rem}
nav{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:.75rem 0;margin-bottom:2rem;border-bottom:1px solid var(--border)}
nav a{color:var(--text-dim);font-size:.85rem;font-weight:500}nav a:hover,nav a.active{color:var(--text)}
.sidebar{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:2rem;padding:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius)}
.sidebar a{color:var(--text-dim);font-size:.8rem;padding:.3rem .6rem;border-radius:var(--radius-sm);transition:all .2s}
.sidebar a:hover,.sidebar a.active{color:var(--accent);background:rgba(59,130,246,.1)}
.content{line-height:1.8}
.content h1{font-size:2rem;margin:1.5rem 0 .75rem;font-weight:700;letter-spacing:-.02em;
background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content h2{font-size:1.4rem;margin:2rem 0 .75rem;color:#f8fafc;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.content h3{font-size:1.15rem;margin:1.5rem 0 .5rem;color:var(--text)}
.content p{margin:.75rem 0;color:#cbd5e1}
.content code{font-family:var(--mono);background:#1e293b;padding:.15rem .4rem;border-radius:4px;font-size:.85em;color:var(--text)}
.content pre{background:var(--bg-card);border:1px solid var(--border);padding:1rem;border-radius:var(--radius-sm);overflow-x:auto;margin:1rem 0}
.content pre code{background:none;padding:0;font-size:.85rem}
.content table{width:100%;border-collapse:collapse;margin:1rem 0}
.content th{background:#1e293b;padding:.5rem .75rem;text-align:left;font-size:.82rem;color:var(--text-dim);border-bottom:1px solid var(--border)}
.content td{padding:.5rem .75rem;border-bottom:1px solid #111827;font-size:.9rem}
.content ul,.content ol{margin:.75rem 0 .75rem 1.5rem;color:#cbd5e1}
.content li{margin:.3rem 0}
.content blockquote{border-left:3px solid var(--accent2);padding:.75rem 1rem;margin:1rem 0;background:var(--bg-card);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-dim)}
.content hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
.content strong{color:#f8fafc}
footer{text-align:center;padding:2rem 0 1rem;border-top:1px solid var(--border);margin-top:3rem;color:var(--text-muted);font-size:.8rem}
footer a{color:var(--text-muted)}
@media(max-width:600px){.wrapper{padding:1.25rem 1rem}.sidebar{gap:.3rem}.content h1{font-size:1.6rem}}
</style>
</head>

</div>
</body>
</html>
