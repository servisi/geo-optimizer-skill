name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepara sorgenti sito
        run: |
          # Copia i markdown da docs/ nel sito Jekyll aggiungendo front matter
          for f in docs/*.md; do
            filename=$(basename "$f" .md)
            # Salta index.md (abbiamo gia site/index.md)
            [ "$filename" = "index" ] && continue

            # Genera titolo dal filename
            title=$(echo "$filename" | sed 's/-/ /g' | sed 's/\b\w/\U&/g')

            # Crea il file nel sito con front matter se non ha gia ---
            if ! head -1 "$f" | grep -q '^---'; then
              {
                echo "---"
                echo "layout: default"
                echo "title: \"$title\""
                echo "description: \"GEO Optimizer documentation: $title\""
                echo "permalink: /$filename/"
                echo "---"
                echo ""
                cat "$f"
              } > "site/$filename.md"
            else
              cp "$f" "site/$filename.md"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build con Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
