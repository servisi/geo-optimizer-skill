name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare site sources
        run: |
          # Copy markdown from docs/ to Jekyll site, adding front matter
          for f in docs/*.md; do
            filename=$(basename "$f" .md)
            # Skip index.md (we already have site/index.md)
            [ "$filename" = "index" ] && continue

            # Generate title from filename
            title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)$i=toupper(substr($i,1,1))substr($i,2)}1')

            # Create the file in site with front matter if it doesn't have --- yet
            if ! head -1 "$f" | grep -q '^---'; then
              {
                echo "---"
                echo "layout: default"
                echo "title: \"$title\""
                echo "description: \"GEO Optimizer documentation: $title\""
                echo "permalink: /$filename/"
                echo "---"
                echo ""
                cat "$f"
              } > "site/$filename.md"
            else
              cp "$f" "site/$filename.md"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build con Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
